<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAS Live Scores</title>

<style>
body {
  margin: 0;
  background: transparent;
  font-family: 'Segoe UI', Arial, sans-serif;
}

/* Widget styles */
.cas-widget {
  max-width: 900px;
  margin: 0 auto;
  border-radius: 12px;
  overflow: hidden;
  background: #2b1e0f; /* dark background for orange theme */
  box-shadow: 0 4px 24px rgba(0,0,0,0.4);
}

.cas-widget-header {
  display: flex;
  justify-content: space-between;
  padding: 14px 20px;
  background: #2b1e0f;
  border-bottom: 2px solid #ff9c3b;
}

.cas-widget-title { font-size: 1rem; font-weight: 700; color: #ff9c3b; text-transform: uppercase; }
.cas-updated { font-size: 0.75rem; color: #ffb87a; }

.cas-league-group { margin: 10px 0; }
.cas-league-title {
  font-size: 0.85rem;
  font-weight: 700;
  color: #ffa347;
  padding: 6px 20px;
  text-transform: uppercase;
  background: #2b1e0f;
}

.cas-match {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  border-bottom: 1px solid #3a2715;
  transition: background 0.2s;
}

.cas-match:hover { background: #3a2715; }
.cas-team { display: flex; align-items: center; }
.cas-team-name { font-weight: 700; color: #ffd9b3; }
.cas-score { font-size: 1.5rem; font-weight: bold; color: #fff; min-width: 80px; text-align: center; }

.cas-badge { font-size: 0.7rem; padding: 3px 8px; border-radius: 20px; font-weight: bold; display: inline-flex; align-items: center; gap: 4px; }
.cas-badge.cas-live { background: rgba(255,156,59,0.15); color: #ff9c3b; border: 1px solid #ff9c3400; }
.cas-badge.cas-ft { background: rgba(255,180,100,0.1); color: #ffb84d; border: 1px solid #ffb84d40; }
.cas-badge.cas-pre { background: rgba(255,200,120,0.1); color: #ffc878; border: 1px solid #ffc87840; }

.cas-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #ff9c3b;
  animation: cas-pulse 1.4s ease-in-out infinite;
}

@keyframes cas-pulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.7); }
}

.cas-empty { padding: 28px; text-align: center; color: #ffb87a; font-size: 0.9rem; }

@media (max-width: 520px) {
  .cas-score { font-size: 1.2rem; min-width: 60px; }
  .cas-team-name { font-size: 0.82rem; }
}
</style>
</head>
<body>

<div id="cas-livescore"></div>

<script>
const GIST_URL = "https://gist.githubusercontent.com/chunkehdemunkeh-afk/250ca7f539145a1ae3deae88cb5f360e/raw/ae2459ce2e6f7497e272fa864c9c69a3e6bd6610/gistfile1.txt";
const POLL_MS = 60000;

// Render a single match
function renderMatch(match) {
  const statusClass = match.status === "LIVE" ? "cas-live" : match.status === "FT" ? "cas-ft" : "cas-pre";
  const isLive = match.status === "LIVE";
  return `
    <div class="cas-match ${statusClass}">
      <div class="cas-team"><span class="cas-team-name">${match.home_team}</span></div>
      <div class="cas-score"><span>${match.home_score ?? "-"}</span> : <span>${match.away_score ?? "-"}</span></div>
      <div class="cas-team"><span class="cas-team-name">${match.away_team}</span></div>
      <div class="cas-badge ${statusClass}">${isLive ? '<span class="cas-dot"></span>' : ''}${match.status}</div>
    </div>`;
}

// Render all matches grouped by league
function renderAll(data) {
  const container = document.getElementById("cas-livescore");

  if (!data || !data.matches || !data.matches.length) {
    container.innerHTML = `<div class="cas-empty">No live or recent matches</div>`;
    autoResize();
    return;
  }

  const leagues = {};
  data.matches.forEach(match => {
    if (!leagues[match.league]) leagues[match.league] = [];
    leagues[match.league].push(match);
  });

  const updated = data.last_updated
    ? new Date(data.last_updated).toLocaleTimeString("en-GB", {hour:"2-digit", minute:"2-digit"})
    : "";

  let html = `<div class="cas-widget">
    <div class="cas-widget-header">
      <span class="cas-widget-title">⚽ Cardiff All Stars — Live Scores</span>
      <span class="cas-updated">Updated: ${updated}</span>
    </div>`;

  for (const league in leagues) {
    html += `<div class="cas-league-group">
      <div class="cas-league-title">${league}</div>
      ${leagues[league].map(renderMatch).join("")}
    </div>`;
  }

  html += `</div>`;
  container.innerHTML = html;
  autoResize();
}

// Dynamically resize iframe height
function autoResize() {
  if (window.frameElement) {
    window.frameElement.style.height = document.body.scrollHeight + "px";
  }
}

// Fetch scores with fallback
async function fetchScores() {
  const container = document.getElementById("cas-livescore");
  container.innerHTML = `<div class="cas-empty">Loading matches…</div>`;
  autoResize();

  try {
    const res = await fetch(GIST_URL + "?t=" + Date.now());
    const text = await res.text();
    const data = JSON.parse(text);
    renderAll(data);
  } catch(e) {
    console.error("Failed to load scores:", e);
    container.innerHTML = `<div class="cas-empty">Error loading scores. Please check the Gist URL or format.</div>`;
    autoResize();
  }
}

// Initial fetch & interval
fetchScores();
setInterval(fetchScores, POLL_MS);
</script>

</body>
</html>
